<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1"/>
  <title>Admin · Atom Buyers Club</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&family=Cormorant+Garamond:ital,wght@0,300;1,300&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg:     #0f0e0c;
      --bg2:    #161512;
      --bg3:    #1e1d1a;
      --border: #2c2b27;
      --cream:  #F5F2ED;
      --dim:    #7a7874;
      --gold:   #B8975A;
      --green:  #4caf7d;
      --red:    #d95e5e;
      --r:      8px;
      --sans:   'DM Sans', system-ui, sans-serif;
      --serif:  'Cormorant Garamond', Georgia, serif;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: var(--sans); background: var(--bg); color: var(--cream); min-height: 100vh; -webkit-font-smoothing: antialiased; }

    /* ── LOGIN ─────────────────────────────────────────────── */
    #login-screen {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      background: radial-gradient(ellipse 60% 40% at 50% 0%, rgba(184,151,90,.07) 0%, transparent 60%);
    }
    .login-box {
      width: 100%;
      max-width: 380px;
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 36px 32px;
    }
    .login-logo { margin-bottom: 28px; }
    .login-logo svg { width: 76px; height: auto; }
    .login-title { font-family: var(--serif); font-size: 22px; font-weight: 300; margin-bottom: 6px; }
    .login-sub   { font-size: 13px; color: var(--dim); margin-bottom: 28px; }

    .login-field { display: flex; flex-direction: column; gap: 6px; margin-bottom: 14px; }
    .login-field label { font-size: 10px; font-weight: 500; letter-spacing: .12em; text-transform: uppercase; color: var(--dim); }
    .login-field input {
      background: var(--bg3); border: 1px solid var(--border); border-radius: var(--r);
      padding: 12px 14px; color: var(--cream); font-family: var(--sans); font-size: 16px;
      outline: none; transition: border-color .15s;
    }
    .login-field input:focus { border-color: var(--gold); }

    .login-err { font-size: 12px; color: var(--red); margin-bottom: 14px; display: none; }
    .login-err.on { display: block; }

    .btn-login {
      width: 100%; padding: 13px; background: var(--cream); color: var(--bg);
      border: none; border-radius: var(--r); font-family: var(--sans); font-size: 15px;
      font-weight: 500; cursor: pointer; margin-top: 4px; transition: background .15s;
    }
    .btn-login:hover { background: #dedad4; }
    .btn-login:disabled { opacity: .5; cursor: not-allowed; }

    /* ── DASHBOARD ─────────────────────────────────────────── */
    #dashboard { display: none; }

    /* Topbar */
    .topbar {
      display: flex; align-items: center; justify-content: space-between;
      padding: 16px 28px; background: var(--bg2); border-bottom: 1px solid var(--border);
      position: sticky; top: 0; z-index: 10;
    }
    .topbar-left { display: flex; align-items: center; gap: 20px; }
    .topbar-left svg { width: 60px; height: auto; }
    .topbar-badge {
      font-size: 10px; font-weight: 500; letter-spacing: .12em;
      text-transform: uppercase; color: var(--dim); border: 1px solid var(--border);
      padding: 3px 10px; border-radius: 20px;
    }
    .topbar-right { display: flex; align-items: center; gap: 14px; }
    .topbar-email { font-size: 12px; color: var(--dim); }
    .btn-logout {
      font-size: 12px; color: var(--dim); background: none; border: 1px solid var(--border);
      border-radius: 6px; padding: 6px 12px; cursor: pointer; transition: color .15s, border-color .15s;
    }
    .btn-logout:hover { color: var(--cream); border-color: var(--dim); }

    /* Stats */
    .stats {
      display: grid; grid-template-columns: repeat(4, 1fr);
      gap: 1px; background: var(--border);
      border-bottom: 1px solid var(--border);
    }
    .stat {
      background: var(--bg2); padding: 20px 24px;
    }
    .stat-value { font-family: var(--serif); font-size: 32px; font-weight: 300; color: var(--cream); line-height: 1; }
    .stat-label { font-size: 11px; color: var(--dim); margin-top: 4px; letter-spacing: .04em; }

    /* Toolbar */
    .toolbar {
      display: flex; align-items: center; gap: 12px; flex-wrap: wrap;
      padding: 16px 28px; border-bottom: 1px solid var(--border);
      background: var(--bg);
    }
    .search-wrap { position: relative; flex: 1; min-width: 200px; max-width: 320px; }
    .search-wrap input {
      width: 100%; background: var(--bg2); border: 1px solid var(--border);
      border-radius: var(--r); padding: 9px 14px 9px 36px; color: var(--cream);
      font-family: var(--sans); font-size: 14px; outline: none; transition: border-color .15s;
    }
    .search-wrap input:focus { border-color: var(--gold); }
    .search-wrap input::placeholder { color: var(--dim); }
    .search-icon { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: var(--dim); font-size: 13px; }

    .filter-select {
      background: var(--bg2); border: 1px solid var(--border); border-radius: var(--r);
      padding: 9px 30px 9px 12px; color: var(--cream); font-family: var(--sans);
      font-size: 13px; outline: none; cursor: pointer; -webkit-appearance: none; appearance: none;
      background-image: url("data:image/svg+xml,%3Csvg width='10' height='6' viewBox='0 0 10 6' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M0 0l5 6 5-6z' fill='%237a7874'/%3E%3C/svg%3E");
      background-repeat: no-repeat; background-position: right 10px center;
    }

    .toolbar-right { margin-left: auto; display: flex; gap: 10px; }

    .btn-export {
      display: flex; align-items: center; gap: 7px;
      padding: 9px 16px; background: var(--bg2); border: 1px solid var(--border);
      border-radius: var(--r); color: var(--cream); font-family: var(--sans);
      font-size: 13px; cursor: pointer; transition: border-color .15s;
    }
    .btn-export:hover { border-color: var(--gold); color: var(--gold); }

    .btn-refresh {
      padding: 9px 12px; background: var(--bg2); border: 1px solid var(--border);
      border-radius: var(--r); color: var(--dim); font-family: var(--sans);
      font-size: 13px; cursor: pointer; transition: color .15s;
    }
    .btn-refresh:hover { color: var(--cream); }

    /* Table */
    .table-wrap { overflow-x: auto; -webkit-overflow-scrolling: touch; }
    table { width: 100%; border-collapse: collapse; font-size: 13px; min-width: 700px; }
    thead th {
      text-align: left; padding: 11px 14px;
      font-size: 10px; font-weight: 500; letter-spacing: .1em; text-transform: uppercase;
      color: var(--dim); border-bottom: 1px solid var(--border);
      white-space: nowrap; background: var(--bg);
    }
    tbody tr { border-bottom: 1px solid var(--border); transition: background .1s; }
    tbody tr:hover { background: var(--bg2); }
    td { padding: 12px 14px; color: var(--cream); vertical-align: middle; white-space: nowrap; }
    td.muted { color: var(--dim); }
    td.wrap  { white-space: normal; max-width: 160px; }

    .badge {
      display: inline-flex; align-items: center; gap: 5px;
      font-size: 11px; font-weight: 500; padding: 3px 9px;
      border-radius: 20px; white-space: nowrap;
    }
    .badge-google   { background: rgba(66,133,244,.15); color: #4285f4; }
    .badge-instagram{ background: rgba(225,48,108,.15);  color: #e1306c; }
    .badge-facebook { background: rgba(24,119,242,.15);  color: #1877f2; }
    .badge-meta     { background: rgba(24,119,242,.15);  color: #1877f2; }
    .badge-organic  { background: rgba(76,175,125,.15);  color: #4caf7d; }
    .badge-default  { background: rgba(184,151,90,.1);   color: var(--gold); }

    .timing-badge {
      font-size: 11px; padding: 3px 8px; border-radius: 4px;
      background: rgba(184,151,90,.1); color: var(--gold);
    }
    .timing-asap { background: rgba(76,175,125,.12); color: #4caf7d; }

    /* Pagination */
    .pagination {
      display: flex; align-items: center; justify-content: space-between;
      padding: 14px 28px; border-top: 1px solid var(--border);
      font-size: 12px; color: var(--dim);
    }
    .page-btns { display: flex; gap: 6px; }
    .page-btn {
      padding: 6px 12px; background: var(--bg2); border: 1px solid var(--border);
      border-radius: 6px; color: var(--dim); cursor: pointer; font-size: 12px;
      transition: color .15s, border-color .15s;
    }
    .page-btn:hover:not(:disabled) { color: var(--cream); border-color: var(--dim); }
    .page-btn:disabled { opacity: .35; cursor: not-allowed; }
    .page-btn.active { border-color: var(--gold); color: var(--gold); }

    /* Empty / loading */
    .table-msg {
      text-align: center; padding: 60px 24px;
      color: var(--dim); font-size: 14px;
    }

    /* Detail drawer */
    .drawer-overlay {
      display: none; position: fixed; inset: 0; background: rgba(0,0,0,.6);
      z-index: 100; backdrop-filter: blur(2px);
    }
    .drawer-overlay.on { display: flex; align-items: flex-start; justify-content: flex-end; }
    .drawer {
      width: 100%; max-width: 420px; height: 100vh;
      background: var(--bg2); border-left: 1px solid var(--border);
      overflow-y: auto; padding: 28px;
      animation: slideIn .2s ease;
    }
    @keyframes slideIn { from { transform: translateX(40px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
    .drawer-close {
      float: right; background: none; border: none; color: var(--dim);
      font-size: 18px; cursor: pointer; padding: 0 0 16px 16px;
    }
    .drawer-title { font-family: var(--serif); font-size: 22px; font-weight: 300; margin-bottom: 4px; }
    .drawer-date  { font-size: 12px; color: var(--dim); margin-bottom: 24px; }
    .badge-updated { background: rgba(76,175,125,.12); color: #4caf7d; font-size: 11px; padding: 2px 9px; border-radius: 20px; margin-left: 8px; }
    .drawer-section { margin-bottom: 20px; }
    .drawer-section-label {
      font-size: 10px; font-weight: 500; letter-spacing: .14em; text-transform: uppercase;
      color: var(--gold); margin-bottom: 10px; padding-bottom: 8px; border-bottom: 1px solid var(--border);
    }
    .drawer-row { display: flex; justify-content: space-between; align-items: flex-start; gap: 12px; padding: 7px 0; font-size: 13px; border-bottom: 1px solid rgba(44,43,39,.6); }
    .drawer-row:last-child { border-bottom: none; }
    .drawer-key { color: var(--dim); flex-shrink: 0; }
    .drawer-val { color: var(--cream); text-align: right; word-break: break-all; }
    .drawer-val a { color: var(--gold); text-decoration: none; }

    /* Delete confirm modal */
    .modal-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,.7); z-index: 200;
      align-items: center; justify-content: center;
      backdrop-filter: blur(3px);
    }
    .modal-overlay.on { display: flex; }
    .modal {
      background: var(--bg2); border: 1px solid var(--border);
      border-radius: 12px; padding: 28px 28px 24px;
      width: 100%; max-width: 360px;
      animation: fadeUp .2s ease;
    }
    .modal-icon { font-size: 28px; margin-bottom: 12px; }
    .modal-title { font-size: 16px; font-weight: 500; color: var(--cream); margin-bottom: 6px; }
    .modal-sub   { font-size: 13px; color: var(--dim); margin-bottom: 24px; line-height: 1.5; }
    .modal-btns  { display: flex; gap: 10px; }
    .btn-cancel {
      flex: 1; padding: 11px; background: none; border: 1px solid var(--border);
      border-radius: 7px; color: var(--dim); font-family: var(--sans);
      font-size: 14px; cursor: pointer; transition: border-color .15s, color .15s;
    }
    .btn-cancel:hover { border-color: var(--dim); color: var(--cream); }
    .btn-confirm-del {
      flex: 1; padding: 11px; background: var(--red); border: none;
      border-radius: 7px; color: #fff; font-family: var(--sans);
      font-size: 14px; font-weight: 500; cursor: pointer; transition: opacity .15s;
    }
    .btn-confirm-del:hover { opacity: .85; }
    .btn-confirm-del:disabled { opacity: .4; cursor: not-allowed; }

    /* Delete btn in rows */
    .btn-del-row {
      background: none; border: none; color: transparent;
      font-size: 14px; cursor: pointer; padding: 4px 6px;
      border-radius: 5px; transition: color .15s, background .15s;
      line-height: 1;
    }
    tbody tr:hover .btn-del-row { color: var(--dim); }
    .btn-del-row:hover { color: var(--red) !important; background: rgba(217,94,94,.1); }

    /* ── Status pipeline ──────────────────────────────────── */
    .status-select-wrap {
      display: flex; align-items: center; gap: 10px;
    }
    .status-dot-inline {
      display: inline-block; width: 10px; height: 10px;
      border-radius: 50%; flex-shrink: 0; transition: background .2s;
    }
    .status-select {
      flex: 1; background: var(--bg3); border: 1px solid var(--border);
      border-radius: var(--r); padding: 10px 30px 10px 12px;
      color: var(--cream); font-family: var(--sans); font-size: 14px;
      outline: none; cursor: pointer; -webkit-appearance: none; appearance: none;
      background-image: url("data:image/svg+xml,%3Csvg width='10' height='6' viewBox='0 0 10 6' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M0 0l5 6 5-6z' fill='%237a7874'/%3E%3C/svg%3E");
      background-repeat: no-repeat; background-position: right 10px center;
      transition: border-color .15s;
    }
    .status-select:focus { border-color: var(--gold); }

    /* Status dot in table */
    .status-dot {
      display: inline-block; width: 7px; height: 7px;
      border-radius: 50%; margin-right: 6px; vertical-align: middle; flex-shrink: 0;
    }

    /* ── CTA buttons ───────────────────────────────────────── */
    .cta-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
    .cta-btn {
      display: flex; flex-direction: column; align-items: center; gap: 5px;
      padding: 12px 8px; border-radius: var(--r); font-family: var(--sans);
      font-size: 12px; font-weight: 500; text-decoration: none;
      border: 1px solid; cursor: pointer; transition: opacity .15s, transform .1s;
      white-space: nowrap;
    }
    .cta-btn:hover { opacity: .82; transform: translateY(-1px); }
    .cta-icon { font-size: 18px; }
    .cta-call     { background: rgba(76,175,125,.1);   color: #4caf7d; border-color: rgba(76,175,125,.25); }
    .cta-whatsapp { background: rgba(37,211,102,.1);   color: #25d366; border-color: rgba(37,211,102,.25); }
    .cta-email    { background: rgba(184,151,90,.1);   color: var(--gold); border-color: rgba(184,151,90,.2); }

    /* ── Notes textarea ────────────────────────────────────── */
    .notes-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; padding-bottom: 8px; border-bottom: 1px solid var(--border); }
    .notes-header .drawer-section-label { margin: 0; padding: 0; border: none; }
    #notes-status { font-size: 11px; color: var(--dim); transition: color .3s; }
    #drawer-notes {
      width: 100%; min-height: 110px;
      background: var(--bg3); border: 1px solid var(--border); border-radius: var(--r);
      padding: 11px 12px; color: var(--cream); font-family: var(--sans);
      font-size: 13px; line-height: 1.6; resize: vertical;
      outline: none; transition: border-color .15s;
    }
    #drawer-notes:focus { border-color: var(--gold); }
    #drawer-notes::placeholder { color: var(--dim); font-style: italic; }

    /* ── iPad (≤ 1024px) ── */
    @media (max-width: 1024px) {
      .stats { grid-template-columns: repeat(2, 1fr); }
      /* Hide less critical columns: Budget, Campagne */
      thead th:nth-child(8),
      thead th:nth-child(10),
      td:nth-child(8),
      td:nth-child(10) { display: none; }
      .toolbar { gap: 8px; }
      .search-wrap { max-width: 220px; }
    }

    /* ── Mobile (≤ 640px) ── */
    @media (max-width: 640px) {
      .topbar { padding: 12px 16px; }
      .topbar-email { display: none; }
      .topbar-left svg { width: 48px; }
      .topbar-badge { font-size: 9px; padding: 2px 8px; }
      .btn-logout { font-size: 11px; padding: 5px 10px; }

      .stats { grid-template-columns: repeat(2, 1fr); }
      .stat { padding: 14px 16px; }
      .stat-value { font-size: 26px; }

      .toolbar { padding: 12px 16px; flex-wrap: wrap; gap: 8px; }
      .search-wrap { max-width: 100%; flex: 1 1 100%; }
      .filter-select { flex: 1; }
      .toolbar-right { width: 100%; justify-content: flex-end; }

      /* Mobile table: show only Date, Nom, Horizon, Source */
      thead th:nth-child(3),
      thead th:nth-child(4),
      thead th:nth-child(5),
      thead th:nth-child(7),
      thead th:nth-child(8),
      thead th:nth-child(10),
      td:nth-child(3),
      td:nth-child(4),
      td:nth-child(5),
      td:nth-child(7),
      td:nth-child(8),
      td:nth-child(10) { display: none; }

      table { min-width: unset; width: 100%; }
      td, thead th { padding: 10px 10px; font-size: 12px; }

      .pagination { padding: 12px 16px; flex-direction: column; gap: 10px; align-items: flex-start; }

      .drawer { max-width: 100%; }
    }
  </style>
</head>
<body>

      </svg>
    </div>
    <h2 class="login-title">Panel Admin</h2>
    <p class="login-sub">Accès réservé aux fondateurs</p>

      <button class="btn-cancel" onclick="closeDelModal()">Annuler</button>

<script>
const TIMING = { asap:'Dès que possible', '3mois':'Dans 3 mois', '6mois':'Dans 6 mois', reflexion:'En réflexion' };
const FIN    = { comptant:'Comptant', emprunt:'Emprunt bancaire' };
const BUDGET = { 'moins-150k':'< 150 k€','150-250k':'150–250 k€','250-400k':'250–400 k€','400-600k':'400–600 k€','600k-1m':'600 k€–1 M€','plus-1m':'> 1 M€' };
const SRC_LABELS = { google:'Google Ads', instagram:'Instagram Ads', facebook:'Facebook Ads', meta:'Meta Ads', organic:'Organique', email:'Email' };
const SRC_CLASS  = { google:'badge-google', instagram:'badge-instagram', facebook:'badge-facebook', meta:'badge-meta', organic:'badge-organic' };
const STATUS_OPTS = [
  { v: 'nouveau',  l: 'Nouveau',      c: '#7a7874' },
  { v: 'contacte', l: 'Contacté',     c: '#4285f4' },
  { v: 'en_cours', l: 'En cours',     c: '#f4a642' },
  { v: 'qualifie', l: 'Qualifié',     c: '#B8975A' },
  { v: 'signe',    l: 'Signé ✓',      c: '#4caf7d' },
  { v: 'perdu',    l: 'Non retenu',   c: '#d95e5e' },
];

let token = null;
let currentPage = 1;
let totalLeads = 0;
let searchTimer = null;
let notesTimer  = null;
let leadsCache  = [];

/* ── Auth ─────────────────────────────────────────────────── */
function init() {
  token = localStorage.getItem('abc_admin_token');
  if (token) showDashboard(localStorage.getItem('abc_admin_email') || '');
}

document.getElementById('login-form').addEventListener('submit', async e => {
  e.preventDefault();
  const btn = document.getElementById('btn-login');
  const err = document.getElementById('login-err');
  btn.disabled = true; btn.textContent = 'Connexion…'; err.classList.remove('on');

  const res = await fetch('/api/auth', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      email: document.getElementById('l-email').value,
      password: document.getElementById('l-pass').value,
    }),
  });

  const data = await res.json();
  btn.disabled = false; btn.textContent = 'Se connecter';

  if (!res.ok) { err.textContent = data.error || 'Erreur'; err.classList.add('on'); return; }

  token = data.token;
  localStorage.setItem('abc_admin_token', token);
  localStorage.setItem('abc_admin_email', data.email);
  showDashboard(data.email);
});

function showDashboard(email) {
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('dashboard').style.display = 'block';
  document.getElementById('admin-email').textContent = email;
  loadLeads(1);
}

function logout() {
  localStorage.removeItem('abc_admin_token');
  localStorage.removeItem('abc_admin_email');
  token = null;
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('dashboard').style.display = 'none';
  document.getElementById('l-pass').value = '';
}

/* ── Leads ─────────────────────────────────────────────────── */
async function loadLeads(page) {
  currentPage = page;
  const search = document.getElementById('search-input').value.trim();
  const source = document.getElementById('src-filter').value;
  const status = document.getElementById('status-filter').value;

  const params = new URLSearchParams({ page, pageSize: 50 });
  if (search) params.set('search', search);
  if (source) params.set('source', source);
  if (status) params.set('status', status);

  const res = await fetch(`/api/leads?${params}`, {
    headers: { Authorization: `Bearer ${token}` },
  });

  if (res.status === 401) { logout(); return; }
  const { leads, total } = await res.json();

  totalLeads = total;
  renderStats(leads, total);
  renderTable(leads);
  renderPagination(page, total, 50);
}

function renderStats(leads, total) {
  document.getElementById('s-total').textContent = total;
  const today = new Date().toDateString();
  const todayCount = leads.filter(l => new Date(l.created_at).toDateString() === today).length;
  document.getElementById('s-today').textContent = todayCount;

  const weekAgo = new Date(Date.now() - 7 * 864e5);
  const weekCount = leads.filter(l => new Date(l.created_at) >= weekAgo).length;
  document.getElementById('s-week').textContent = weekCount;

  const srcCounts = {};
  leads.forEach(l => { if (l.utm_source) srcCounts[l.utm_source] = (srcCounts[l.utm_source] || 0) + 1; });
  const topSrc = Object.entries(srcCounts).sort((a,b) => b[1]-a[1])[0];
  document.getElementById('s-top-src').textContent = topSrc ? (SRC_LABELS[topSrc[0]] || topSrc[0]) : '—';
}

function renderTable(leads) {
  leadsCache = leads;
  const tbody = document.getElementById('leads-body');
  if (!leads.length) {
    tbody.innerHTML = '<tr><td colspan="10" class="table-msg">Aucun lead trouvé</td></tr>';
    return;
  }
  tbody.innerHTML = leads.map((l, i) => `
    <tr style="cursor:pointer" data-idx="${i}">
      <td class="muted">${fmtDate(l.created_at)}</td>
      <td><strong>${statusDot(l.status)}${esc(l.prenom)} ${esc(l.nom)}</strong></td>
      <td class="muted">${esc(l.email)}</td>
      <td class="muted">${esc(l.tel)}</td>
      <td class="muted wrap">${esc(l.arrondissements) || '—'}</td>
      <td>${l.timing ? `<span class="timing-badge ${l.timing === 'asap' ? 'timing-asap' : ''}">${TIMING[l.timing] || l.timing}</span>` : '<span class="muted">—</span>'}</td>
      <td class="muted">${FIN[l.financement] || l.financement || '—'}</td>
      <td class="muted">${BUDGET[l.capacite] || l.capacite || '—'}</td>
      <td>${srcBadge(l.utm_source)}</td>
      <td class="muted">${esc(l.utm_campaign) || '—'}</td>
      <td><button class="btn-del-row" title="Supprimer">✕</button></td>
    </tr>
  `).join('');

  tbody.querySelectorAll('tr[data-idx]').forEach(tr => {
    const delBtn = tr.querySelector('.btn-del-row');
    delBtn.addEventListener('click', (e) => {
      e.stopPropagation();
      openDelModal(leadsCache[+tr.dataset.idx]);
    });
    tr.addEventListener('click', () => openDrawer(leadsCache[+tr.dataset.idx]));
  });
}

function renderPagination(page, total, pageSize) {
  const pages = Math.ceil(total / pageSize);
  document.getElementById('page-info').textContent = `${total} lead${total > 1 ? 's' : ''} · Page ${page}/${pages}`;

  const btns = document.getElementById('page-btns');
  btns.innerHTML = '';

  const prev = document.createElement('button');
  prev.className = 'page-btn'; prev.textContent = '←'; prev.disabled = page <= 1;
  prev.onclick = () => loadLeads(page - 1);
  btns.appendChild(prev);

  for (let p = Math.max(1, page-1); p <= Math.min(pages, page+1); p++) {
    const b = document.createElement('button');
    b.className = `page-btn ${p === page ? 'active' : ''}`;
    b.textContent = p; b.onclick = () => loadLeads(p);
    btns.appendChild(b);
  }

  const next = document.createElement('button');
  next.className = 'page-btn'; next.textContent = '→'; next.disabled = page >= pages;
  next.onclick = () => loadLeads(page + 1);
  btns.appendChild(next);
}

/* ── Delete ─────────────────────────────────────────────────── */
let pendingDeleteId = null;

function openDelModal(lead) {
  pendingDeleteId = lead.id;
  document.getElementById('del-desc').textContent =
    `${lead.prenom} ${lead.nom} (${lead.email}) — cette action est irréversible.`;
  const btn = document.getElementById('btn-confirm-del');
  btn.disabled = false;
  btn.textContent = 'Supprimer';
  document.getElementById('del-overlay').classList.add('on');
}

function closeDelModal() {
  pendingDeleteId = null;
  document.getElementById('del-overlay').classList.remove('on');
}

async function confirmDelete() {
  if (!pendingDeleteId) return;
  const btn = document.getElementById('btn-confirm-del');
  btn.disabled = true;
  btn.textContent = 'Suppression…';

  const res = await fetch(`/api/delete?id=${pendingDeleteId}`, {
    method: 'DELETE',
    headers: { Authorization: `Bearer ${token}` },
  });

  if (res.status === 401) { logout(); return; }

  closeDelModal();
  loadLeads(currentPage);
}

/* ── Drawer ─────────────────────────────────────────────────── */
function openDrawer(lead) {
  clearTimeout(notesTimer);
  const src = lead.utm_source ? (SRC_LABELS[lead.utm_source.toLowerCase()] || lead.utm_source) : '—';
  const curStatus = STATUS_OPTS.find(o => o.v === (lead.status || 'nouveau')) || STATUS_OPTS[0];
  const phone = phoneIntl(lead.tel);

  const waText = encodeURIComponent(
    `Bonjour ${lead.prenom} 👋\n\nJe suis de l'équipe Atom Buyers Club.\n\nSuite à votre inscription sur notre plateforme, j'aimerais échanger avec vous sur votre projet immobilier à Paris.\n\nÊtes-vous disponible pour un appel dans les prochains jours ?\n\nCordialement,\nL'équipe Atom Buyers Club`
  );
  const mailSubject = encodeURIComponent(`Atom Buyers Club — Vos opportunités immobilières à Paris`);
  const mailBody = encodeURIComponent(
    `Bonjour ${lead.prenom},\n\nSuite à votre inscription sur Atom Buyers Club, nous souhaitions prendre contact avec vous.\n\nNous avons des opportunités immobilières correspondant à vos critères et aimerions vous les présenter.\n\nPourriez-vous nous indiquer vos disponibilités pour un échange ?\n\nCordialement,\nL'équipe Atom Buyers Club`
  );

  const statusOptions = STATUS_OPTS.map(o =>
    `<option value="${o.v}"${o.v === (lead.status || 'nouveau') ? ' selected' : ''}>${o.l}</option>`
  ).join('');

  document.getElementById('drawer-content').innerHTML = `
    <h3 class="drawer-title">
      ${esc(lead.prenom)} ${esc(lead.nom)}
      ${lead.updated_at ? `<span class="badge-updated">Mis à jour</span>` : ''}
    </h3>
    <p class="drawer-date">
      Créé le ${fmtDateFull(lead.created_at)}
      ${lead.updated_at ? `· <span style="color:#4caf7d">Modifié le ${fmtDateFull(lead.updated_at)}</span>` : ''}
    </p>

    <div class="drawer-section">
      <p class="drawer-section-label">Statut du dossier</p>
      <div class="status-select-wrap">
        <span class="status-dot-inline" id="status-dot" style="background:${curStatus.c}"></span>
        <select class="status-select" id="status-select" onchange="updateLeadStatus('${esc(lead.id)}', this.value)">
          ${statusOptions}
        </select>
      </div>
    </div>

    <div class="drawer-section">
      <p class="drawer-section-label">Actions</p>
      <div class="cta-grid">
        <a class="cta-btn cta-call" href="tel:${esc(lead.tel)}">
          <span class="cta-icon">📞</span><span>Appeler</span>
        </a>
        <a class="cta-btn cta-whatsapp" href="https://wa.me/${phone}?text=${waText}" target="_blank" rel="noopener noreferrer">
          <span class="cta-icon">💬</span><span>WhatsApp</span>
        </a>
        <a class="cta-btn cta-email" href="mailto:${esc(lead.email)}?subject=${mailSubject}&body=${mailBody}">
          <span class="cta-icon">✉</span><span>Email</span>
        </a>
      </div>
    </div>

    <div class="drawer-section">
      <p class="drawer-section-label">Coordonnées</p>
      <div class="drawer-row"><span class="drawer-key">Email</span><span class="drawer-val"><a href="mailto:${esc(lead.email)}">${esc(lead.email)}</a></span></div>
      <div class="drawer-row"><span class="drawer-key">Téléphone</span><span class="drawer-val"><a href="tel:${esc(lead.tel)}">${esc(lead.tel)}</a></span></div>
    </div>

    <div class="drawer-section">
      <p class="drawer-section-label">Projet</p>
      <div class="drawer-row"><span class="drawer-key">Arrondissements</span><span class="drawer-val">${esc(lead.arrondissements) || '—'}</span></div>
      <div class="drawer-row"><span class="drawer-key">Horizon</span><span class="drawer-val">${TIMING[lead.timing] || lead.timing || '—'}</span></div>
    </div>

    <div class="drawer-section">
      <p class="drawer-section-label">Financement</p>
      <div class="drawer-row"><span class="drawer-key">Étude bancaire</span><span class="drawer-val">${lead.accord === 'oui' ? '✅ Étude validée' : lead.accord === 'courtier' ? '🤝 Courtier souhaité' : lead.accord === 'non' ? 'Gère seul' : '—'}</span></div>
      <div class="drawer-row"><span class="drawer-key">Mode</span><span class="drawer-val">${FIN[lead.financement] || lead.financement || '—'}</span></div>
      <div class="drawer-row"><span class="drawer-key">Budget emprunt</span><span class="drawer-val">${BUDGET[lead.capacite] || lead.capacite || '—'}</span></div>
    </div>

    <div class="drawer-section">
      <p class="drawer-section-label">Tracking campagne</p>
      <div class="drawer-row"><span class="drawer-key">Source</span><span class="drawer-val">${src}</span></div>
      <div class="drawer-row"><span class="drawer-key">Medium</span><span class="drawer-val">${esc(lead.utm_medium) || '—'}</span></div>
      <div class="drawer-row"><span class="drawer-key">Campagne</span><span class="drawer-val">${esc(lead.utm_campaign) || '—'}</span></div>
      <div class="drawer-row"><span class="drawer-key">Contenu</span><span class="drawer-val">${esc(lead.utm_content) || '—'}</span></div>
      ${lead.gclid  ? `<div class="drawer-row"><span class="drawer-key">GCLID</span><span class="drawer-val">${esc(lead.gclid)}</span></div>` : ''}
      ${lead.fbclid ? `<div class="drawer-row"><span class="drawer-key">FBCLID</span><span class="drawer-val">${esc(lead.fbclid)}</span></div>` : ''}
      <div class="drawer-row"><span class="drawer-key">Référent</span><span class="drawer-val">${esc(lead.referrer) || '—'}</span></div>
    </div>

    <div class="drawer-section">
      <div class="notes-header">
        <p class="drawer-section-label">Notes internes</p>
        <span id="notes-status"></span>
      </div>
      <textarea id="drawer-notes" placeholder="Observations, points de contact, étapes suivantes…" oninput="scheduleNotesSave('${esc(lead.id)}')">${esc(lead.notes || '')}</textarea>
    </div>
  `;
  document.getElementById('drawer-overlay').classList.add('on');
}

function closeDrawer(e) {
  if (!e || e.target === document.getElementById('drawer-overlay')) {
    clearTimeout(notesTimer);
    document.getElementById('drawer-overlay').classList.remove('on');
  }
}

/* ── Status & Notes ─────────────────────────────────────────── */
async function updateLeadStatus(id, status) {
  const res = await fetch(`/api/patch?id=${id}`, {
    method: 'PATCH',
    headers: { 'Content-Type': 'application/json', Authorization: `Bearer ${token}` },
    body: JSON.stringify({ status }),
  });
  if (res.status === 401) { logout(); return; }
  const s = STATUS_OPTS.find(o => o.v === status) || STATUS_OPTS[0];
  const dot = document.getElementById('status-dot');
  if (dot) dot.style.background = s.c;
  const lead = leadsCache.find(l => l.id === id);
  if (lead) { lead.status = status; renderTable(leadsCache); }
}

function scheduleNotesSave(id) {
  clearTimeout(notesTimer);
  const statusEl = document.getElementById('notes-status');
  if (statusEl) statusEl.textContent = '';
  notesTimer = setTimeout(() => saveNotes(id), 1200);
}

async function saveNotes(id) {
  const textarea = document.getElementById('drawer-notes');
  if (!textarea) return;
  const notes = textarea.value;
  const statusEl = document.getElementById('notes-status');
  if (statusEl) { statusEl.textContent = 'Sauvegarde…'; statusEl.style.color = 'var(--dim)'; }
  const res = await fetch(`/api/patch?id=${id}`, {
    method: 'PATCH',
    headers: { 'Content-Type': 'application/json', Authorization: `Bearer ${token}` },
    body: JSON.stringify({ notes }),
  });
  if (res.status === 401) { logout(); return; }
  const lead = leadsCache.find(l => l.id === id);
  if (lead) lead.notes = notes;
  if (statusEl) { statusEl.textContent = 'Sauvegardé ✓'; statusEl.style.color = 'var(--green)'; }
}


/* ── Export ─────────────────────────────────────────────────── */
async function exportCSV() {
  const res = await fetch('/api/export', { headers: { Authorization: `Bearer ${token}` } });
  if (res.status === 401) { logout(); return; }
  const blob = await res.blob();
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href = url; a.download = `leads_abc_${new Date().toISOString().slice(0,10)}.csv`;
  a.click(); URL.revokeObjectURL(url);
}

/* ── Helpers ────────────────────────────────────────────────── */
function debounceSearch() {
  clearTimeout(searchTimer);
  searchTimer = setTimeout(() => loadLeads(1), 350);
}

function fmtDate(d) {
  return new Date(d).toLocaleDateString('fr-FR', { day:'2-digit', month:'2-digit', year:'2-digit', hour:'2-digit', minute:'2-digit' });
}
function fmtDateFull(d) {
  if (!d) return '—';
  return new Date(d).toLocaleString('fr-FR', { weekday:'long', day:'numeric', month:'long', year:'numeric', hour:'2-digit', minute:'2-digit' });
}

function esc(s) {
  if (!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function srcBadge(src) {
  if (!src) return '<span class="muted">—</span>';
  const cls = SRC_CLASS[src.toLowerCase()] || 'badge-default';
  const lbl = SRC_LABELS[src.toLowerCase()] || src;
  return `<span class="badge ${cls}">${lbl}</span>`;
}

function statusDot(status) {
  const s = STATUS_OPTS.find(o => o.v === status) || STATUS_OPTS[0];
  return `<span class="status-dot" style="background:${s.c}"></span>`;
}

function phoneIntl(tel) {
  const c = (tel || '').replace(/[\s\-\.()]/g, '');
  if (c.startsWith('+')) return c.slice(1);
  if (c.startsWith('00')) return c.slice(2);
  if (c.startsWith('0')) return '33' + c.slice(1);
  return c;
}

init();
